<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Tic Tac Toe</title>

		<link rel="stylesheet" href="./style.css" />
	</head>
	<body>
		<div class="container">
			<h1>Tic Tac Toe</h1>

			<div class="game-setup">
				<h2>Game Setup</h2>

				<div class="player-setup">
					<header><h3>Player Setup</h3></header>

					<main>
						<div class="player-setup-row">
							<label for="playerOne">Player One</label>
							<select name="playerOne" id="playerOne">
								<option value="player">Player</option>
								<option value="computer">Computer</option>
							</select>
						</div>

						<div class="player-setup-row">
							<p>VS</p>
						</div>

						<div class="player-setup-row">
							<label for="playerTwo">Player Two</label>
							<select name="playerTwo" id="playerTwo">
								<option value="player">Player</option>
								<option value="computer">Computer</option>
							</select>
						</div>
					</main>

					<footer>
						<button class="btn btn-primary" id="startGame">Start Game</button>
						<button class="btn" id="resetGameSetup">Reset Setup</button>
					</footer>
				</div>
			</div>

			<div class="game none">
				<header><h2>The Game</h2></header>
				<main>
					<header>
						<div class="players-board">
							<!-- player one -->
							<div class="player-info">
								<h3 class="player-name">
									Player 1 (<span id="playerOneBehavior">Human</span>)
								</h3>
								<p class="player-score">
									Score: <span id="playerOneScore">0</span>
								</p>
							</div>
							<!-- tie score -->
							<div class="tie-score-info">
								<p>Tie score: <span id="tie-score">0</span></p>
							</div>
							<!-- player two -->
							<div class="player-info">
								<h3 class="player-name">
									Player 2 (<span id="playerTwoBehavior">Computer</span>)
								</h3>
								<p class="player-score">
									Score: <span id="playerTwoScore">0</span>
								</p>
							</div>
						</div>
					</header>
					<main id="#board"></main>
					<footer><button class="btn" id="resetGame">Reset</button></footer>
				</main>
				<footer>
					<button class="btn" id="backToGameSetup">Back To Game Setup</button>
				</footer>
			</div>
		</div>
		<script src="./index.js"></script>
	</body>
</html>
